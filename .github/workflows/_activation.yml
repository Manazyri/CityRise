## ONE-SHOT WORKFLOW — DELETE THIS FILE AFTER USE.
##
## Purpose: generate the Unity license activation request file (.alf)
## needed to acquire a personal license for CI.
##
## Usage:
##   1. Commit this file and push to main (or trigger via Actions tab → "Run workflow")
##   2. Wait for the workflow to finish
##   3. Download the "Unity_v6000.3.14f1.alf" artifact from the run summary
##   4. Visit https://license.unity3d.com/manual
##   5. Upload the .alf file, fill the form (Personal license is free)
##   6. Download the resulting Unity_v<version>.ulf file
##   7. Open the .ulf file in a text editor, copy its full contents
##   8. In GitHub: Settings → Secrets and variables → Actions → New repository secret
##         Name:  UNITY_LICENSE
##         Value: <paste the .ulf contents>
##   9. Delete this file ( rm .github/workflows/_activation.yml ) and commit/push.
##
## Reference: https://game.ci/docs/github/activation

name: Acquire activation file

on:
  workflow_dispatch:

jobs:
  activation:
    name: Request .alf for Unity 6000.3.14f1
    runs-on: ubuntu-latest
    steps:
      - name: Request activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.3.14f1

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.getManualLicenseFile.outputs.filePath }}
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
